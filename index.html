<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyValue - Polytoria Item Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#222233;
--txt:#e8e8f0;--txt2:#8888aa;--txt3:#55556a;
--accent:#6c5ce7;--accent2:#a29bfe;--accent3:#4834d4;
--green:#00b894;--red:#e17055;--gold:#fdcb6e;--orange:#fd9644;
--border:#2a2a3a;--radius:10px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
a{color:var(--accent2);text-decoration:none}a:hover{text-decoration:underline}
.nav{background:rgba(18,18,26,0.92);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.nav-logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent2);letter-spacing:-0.5px;margin-right:32px;display:flex;align-items:center;gap:8px;cursor:default}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,184,148,0.4)}50%{box-shadow:0 0 0 4px rgba(0,184,148,0)}}
.nav-logo .wordmark{color:var(--txt)}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;transition:.2s;border:none;background:none;font-family:inherit}
.nav-link:hover{color:var(--txt);background:var(--bg3)}
.nav-link.active{color:var(--accent2);background:rgba(108,92,231,0.13)}
.nav-search{margin-left:auto;position:relative}
.nav-search input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px 8px 36px;color:var(--txt);font-size:13px;width:260px;outline:none;font-family:inherit;transition:.2s}
.nav-search input:focus{border-color:var(--accent);width:320px}
.nav-search input::placeholder{color:var(--txt3)}
.nav-search .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.container{max-width:1200px;margin:0 auto;padding:24px}
.page{display:none}.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:.2s}
.card:hover{border-color:rgba(108,92,231,0.27)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.stat-box{background:var(--bg3);border-radius:8px;padding:14px;text-align:center}
.stat-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--accent2)}
.stat-label{font-size:11px;color:var(--txt2);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.2s}
.item-card:hover{transform:translateY(-2px);border-color:rgba(108,92,231,0.4);box-shadow:0 8px 24px rgba(108,92,231,0.1)}
.item-img{width:100%;aspect-ratio:1;object-fit:contain;background:var(--bg3);padding:12px}
.item-info{padding:12px}
.item-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-rap{font-family:'Space Mono',monospace;font-size:12px;color:var(--green);margin-top:4px}
.item-value{font-size:10px;color:var(--txt2);margin-top:2px}
.item-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.item-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.tag-hoarded{background:rgba(253,203,110,0.15);color:var(--gold)}
.tag-projected{background:rgba(225,112,85,0.15);color:var(--red)}
.tag-rare{background:rgba(108,92,231,0.2);color:var(--accent2)}
.tag-unsettled{background:rgba(253,150,68,0.15);color:var(--orange)}
.demand-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.demand-high{background:rgba(0,184,148,0.15);color:var(--green)}
.demand-normal{background:rgba(162,155,254,0.15);color:var(--accent2)}
.demand-low{background:rgba(225,112,85,0.15);color:var(--red)}
.trend-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.trend-rising{background:rgba(0,184,148,0.15);color:var(--green)}
.trend-stable{background:rgba(162,155,254,0.12);color:var(--accent2)}
.trend-unstable{background:rgba(225,112,85,0.15);color:var(--red)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:620px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:28px}
.modal-close{float:right;background:var(--bg3);border:none;color:var(--txt2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:.2s;line-height:1}
.modal-close:hover{background:var(--red);color:#fff}
.modal-item-header{display:flex;gap:20px;margin-top:8px}
.modal-item-img{width:160px;height:160px;object-fit:contain;background:var(--bg3);border-radius:12px;padding:12px;flex-shrink:0}
.modal-item-info h2{font-size:20px;margin-bottom:4px;line-height:1.3}
.modal-item-info .shorthand{font-size:12px;color:var(--txt3);margin-bottom:8px;font-family:'Space Mono',monospace}
.funfact{font-size:12px;color:var(--gold);background:rgba(253,203,110,0.08);border:1px solid rgba(253,203,110,0.2);border-radius:8px;padding:10px 12px;margin-top:10px;line-height:1.5}
.profile-header{display:flex;gap:24px;align-items:flex-start;margin-bottom:24px}
.profile-avatar{width:100px;height:100px;border-radius:14px;background:var(--bg3);object-fit:cover;flex-shrink:0}
.profile-info h1{font-size:26px;margin-bottom:4px}
.profile-info .join-date{font-size:12px;color:var(--txt3);margin-bottom:8px}
.profile-info .bio{font-size:13px;color:var(--txt2);max-width:500px;line-height:1.6;margin-top:8px}
.trade-ad{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:center;transition:.2s}
.trade-ad:hover{border-color:rgba(108,92,231,0.27)}
.trade-items{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.trade-item-mini{width:56px;height:56px;border-radius:8px;background:var(--bg3);object-fit:contain;padding:4px}
.trade-arrow{color:var(--txt3);font-size:22px;flex-shrink:0}
.trade-user{font-size:12px;color:var(--txt2);min-width:90px;text-align:right}
.trade-user b{color:var(--txt);display:block;margin-bottom:2px}
.input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--txt);font-size:13px;width:100%;outline:none;font-family:inherit;transition:.2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--txt3)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent3);transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--txt2)}.btn-ghost:hover{color:var(--txt);background:var(--bg4)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);transition:.2s;letter-spacing:0.2px}
.chip:hover{border-color:var(--accent);color:var(--accent2)}
.chip.active{border-color:var(--accent);color:var(--accent2);background:rgba(108,92,231,0.1)}
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty h3{color:var(--txt2);margin-bottom:8px;font-size:16px}
.empty p{font-size:13px}
.pagination{display:flex;justify-content:center;align-items:center;gap:12px;padding:20px 0}
.page-info{font-size:13px;color:var(--txt2);font-family:'Space Mono',monospace}
label.form-label{font-size:11px;color:var(--txt2);display:block;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
@media(max-width:768px){
.nav-search input{width:140px}.nav-search input:focus{width:180px}
.item-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.modal-item-header{flex-direction:column}.modal-item-img{width:100%;height:200px}
.profile-header{flex-direction:column;align-items:center;text-align:center}
.nav-links .nav-link{padding:8px 10px;font-size:12px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><span class="dot"></span><span>Poly</span><span class="wordmark">Value</span></div>
  <div class="nav-links">
    <button class="nav-link active" data-page="items">Items</button>
    <button class="nav-link" data-page="players">Players</button>
    <button class="nav-link" data-page="trades">Trade Ads</button>
  </div>
  <div class="nav-search">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="global-search" placeholder="Search items...">
  </div>
</nav>

<div class="container">
  <div class="page active" id="page-items">
    <div class="filter-bar">
      <input class="input" id="item-search" placeholder="Search limiteds..." style="width:220px">
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
        <span class="chip" id="chip-valued">Has Value</span>
        <span class="chip" id="chip-hoarded">💰 Hoarded</span>
        <span class="chip" id="chip-rare">💎 Rare</span>
      </div>
    </div>
    <div id="items-grid" class="item-grid"></div>
    <div class="pagination">
      <button class="btn btn-ghost" id="btn-prev" style="display:none">← Prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="btn btn-ghost" id="btn-next">Next →</button>
    </div>
  </div>

  <div class="page" id="page-players">
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><span class="card-title">Player Lookup</span></div>
      <div style="display:flex;gap:8px">
        <input class="input" id="player-input" placeholder="Enter username or user ID" style="flex:1">
        <button class="btn btn-primary" id="player-lookup-btn">Look Up</button>
      </div>
    </div>
    <div id="player-result"></div>
  </div>

  <div class="page" id="page-trades">
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><span class="card-title">Post Trade Ad</span></div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:end;margin-bottom:12px">
        <div>
          <label class="form-label">Offering (item IDs, comma separated)</label>
          <input class="input" id="trade-offer" placeholder="e.g. 103218, 50234">
        </div>
        <span style="color:var(--txt3);font-size:22px;padding-bottom:11px;text-align:center">⇄</span>
        <div>
          <label class="form-label">Looking For (item IDs, comma separated)</label>
          <input class="input" id="trade-want" placeholder="e.g. 80012">
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:end">
        <div style="flex:1">
          <label class="form-label">Your User ID</label>
          <input class="input" id="trade-userid" placeholder="e.g. 20225">
        </div>
        <button class="btn btn-primary" id="trade-post">Post Ad</button>
      </div>
    </div>
    <div id="trade-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const TRADE_API = "https://polytoria.trade/api/trpc/getItemsByPage?batch=1";
const POLY_API  = "https://api.polytoria.com/v1";

function esc(s){const d=document.createElement("div");d.textContent=(s==null?"":String(s));return d.innerHTML}
function num(n){if(n==null)return "—";return Number(n).toLocaleString()}

const TAG_CLASSES = {"Hoarded":"hoarded","Projected":"projected","Rare":"rare","Unsettled":"unsettled"};

function renderTagBadges(tags, allTags) {
  if(!tags||!tags.length) return "";
  return tags.map(t=>{
    const def = allTags.find(a=>a.id===t.tagId);
    if(!def) return "";
    return `<span class="item-tag tag-${TAG_CLASSES[def.name]||'hoarded'}">${def.emoji} ${esc(def.name)}</span>`;
  }).join("");
}

let currentPage=1, totalPages=1, allTags=[];
let filterValued=false, filterHoarded=false, filterRare=false, searchQuery="";
let itemCache={}, tradeAds=[];
try{tradeAds=JSON.parse(localStorage.getItem("pv_trades")||"[]")}catch(e){}

async function fetchItems(page, search){
  const r = await fetch(TRADE_API,{
    method:"POST",
    headers:{"content-type":"application/json"},
    body:JSON.stringify({"0":{page,total:24,search:search||"",homepage:false}})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json();
  return j[0].result.data;
}

// Nav
document.querySelectorAll(".nav-link").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav-link").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("page-"+btn.dataset.page).classList.add("active");
  });
});

document.getElementById("global-search").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  const q=e.target.value.trim(); if(!q) return;
  document.getElementById("item-search").value=q;
  searchQuery=q; currentPage=1;
  document.querySelectorAll(".nav-link").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelector('[data-page="items"]').classList.add("active");
  document.getElementById("page-items").classList.add("active");
  loadItems();
});

let searchTimer;
document.getElementById("item-search").addEventListener("input",e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{searchQuery=e.target.value.trim();currentPage=1;loadItems();},350);
});

document.getElementById("chip-valued").addEventListener("click",function(){filterValued=!filterValued;this.classList.toggle("active",filterValued);currentPage=1;loadItems();});
document.getElementById("chip-hoarded").addEventListener("click",function(){filterHoarded=!filterHoarded;this.classList.toggle("active",filterHoarded);currentPage=1;loadItems();});
document.getElementById("chip-rare").addEventListener("click",function(){filterRare=!filterRare;this.classList.toggle("active",filterRare);currentPage=1;loadItems();});

document.getElementById("btn-prev").addEventListener("click",()=>{if(currentPage>1){currentPage--;loadItems();}});
document.getElementById("btn-next").addEventListener("click",()=>{if(currentPage<totalPages){currentPage++;loadItems();}});

async function loadItems(){
  const grid=document.getElementById("items-grid");
  grid.innerHTML='<div class="spinner"></div>';
  try{
    const data=await fetchItems(currentPage,searchQuery);
    allTags=data.allTags||[];
    totalPages=data.totalPages||1;
    let items=data.items||[];

    if(filterValued) items=items.filter(i=>i.stats?.value!=null);
    if(filterHoarded) items=items.filter(i=>i.tags?.some(t=>{const d=allTags.find(a=>a.id===t.tagId);return d?.name==="Hoarded";}));
    if(filterRare) items=items.filter(i=>i.tags?.some(t=>{const d=allTags.find(a=>a.id===t.tagId);return d?.name==="Rare";}));

    grid.innerHTML="";
    if(!items.length){
      grid.innerHTML='<div class="empty"><h3>No items found</h3><p>Try different filters</p></div>';
    } else {
      items.forEach(item=>{
        itemCache[item.id]=item;
        const w=document.createElement("div");
        w.innerHTML=renderItemCard(item);
        grid.appendChild(w.firstChild);
      });
    }
    document.getElementById("page-info").textContent="Page "+currentPage+" / "+totalPages;
    document.getElementById("btn-prev").style.display=currentPage>1?"":"none";
    document.getElementById("btn-next").style.display=currentPage<totalPages?"":"none";
  } catch(e){
    grid.innerHTML='<div class="empty"><h3>Failed to load</h3><p>'+esc(e.message)+'</p></div>';
  }
}

function renderItemCard(item){
  const tags=renderTagBadges(item.tags,allTags);
  return `<div class="item-card" onclick="showItem(${item.id})">
    <img class="item-img" src="${esc(item.thumbnailUrl||"")}" alt="${esc(item.name)}" loading="lazy"
      onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22 fill=%22%231a1a26%22><rect width=%22100%22 height=%22100%22/><text y=%2262%22 x=%2228%22 font-size=%2244%22>?</text></svg>'">
    <div class="item-info">
      <div class="item-name" title="${esc(item.name)}">${esc(item.name)}</div>
      ${item.recentAverage!=null?'<div class="item-rap">RAP: '+num(item.recentAverage)+'</div>':""}
      ${item.stats?.value!=null?'<div class="item-value">Value: '+num(item.stats.value)+'</div>':""}
      ${tags?'<div class="item-tags">'+tags+'</div>':""}
    </div>
  </div>`;
}

window.showItem = function(id){
  const overlay=document.getElementById("modal-overlay");
  const content=document.getElementById("modal-content");
  overlay.classList.add("open");
  const item=itemCache[id];
  if(!item){content.innerHTML='<div class="empty"><h3>Item not found</h3></div>';return;}

  const tags=renderTagBadges(item.tags,allTags);
  const demand=item.stats?.demand||"";
  const trend=item.stats?.trend||"";
  const demandHtml=demand?`<span class="demand-badge demand-${demand}">${esc(demand)} demand</span>`:"";
  const trendHtml=trend?`<span class="trend-badge trend-${trend}">trend: ${esc(trend)}</span>`:"";
  const rapVsVal=(item.stats?.value&&item.recentAverage)?Math.round((item.recentAverage-item.stats.value)/item.stats.value*100):null;

  content.innerHTML=`
    <div class="modal-item-header">
      <img class="modal-item-img" src="${esc(item.thumbnailUrl||"")}" alt="${esc(item.name)}" onerror="this.style.background='var(--bg4)'">
      <div class="modal-item-info" style="flex:1;min-width:0">
        <h2>${esc(item.name)}</h2>
        ${item.shorthand?'<div class="shorthand">aka '+esc(item.shorthand)+'</div>':""}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0">${tags}${demandHtml}${trendHtml}</div>
        ${item.stats?.funFact?'<div class="funfact">💡 '+esc(item.stats.funFact)+'</div>':""}
      </div>
    </div>
    <div class="stat-grid" style="margin-top:20px">
      <div class="stat-box"><div class="stat-val" style="color:var(--green)">${num(item.recentAverage)}</div><div class="stat-label">RAP</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--accent2)">${item.stats?.value!=null?num(item.stats.value):"—"}</div><div class="stat-label">Est. Value</div></div>
      <div class="stat-box"><div class="stat-val" style="font-size:13px;color:${demand==='high'?'var(--green)':demand==='low'?'var(--red)':'var(--txt2)'}">${demand||"—"}</div><div class="stat-label">Demand</div></div>
      <div class="stat-box"><div class="stat-val" style="font-size:13px;color:${trend==='rising'?'var(--green)':trend==='unstable'?'var(--red)':'var(--txt2)'}">${trend||"—"}</div><div class="stat-label">Trend</div></div>
    </div>
    ${rapVsVal!==null?`
    <div class="card" style="margin-top:4px;background:var(--bg3)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--txt2)">RAP vs Est. Value</span>
        <span style="font-family:'Space Mono';font-size:15px;font-weight:700;color:${rapVsVal>0?'var(--green)':'var(--red)'}">
          ${rapVsVal>0?"▲":"▼"} ${Math.abs(rapVsVal)}%
        </span>
      </div>
      <div style="margin-top:8px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,Math.abs(rapVsVal))}%;background:${rapVsVal>0?'var(--green)':'var(--red)'};border-radius:3px"></div>
      </div>
    </div>`:""}
    <div style="margin-top:16px;text-align:center;display:flex;gap:8px;justify-content:center">
      <a href="https://polytoria.com/store/${id}" target="_blank" class="btn btn-primary" style="display:inline-block;text-decoration:none">View on Polytoria →</a>
      <a href="https://polytoria.trade/store/${id}" target="_blank" class="btn btn-ghost" style="display:inline-block;text-decoration:none">polytoria.trade →</a>
    </div>`;
};

document.getElementById("modal-close").addEventListener("click",()=>document.getElementById("modal-overlay").classList.remove("open"));
document.getElementById("modal-overlay").addEventListener("click",e=>{if(e.target===e.currentTarget)e.target.classList.remove("open");});
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("modal-overlay").classList.remove("open");});

// Player lookup
document.getElementById("player-lookup-btn").addEventListener("click",()=>{const v=document.getElementById("player-input").value.trim();if(v)lookupPlayer(v);});
document.getElementById("player-input").addEventListener("keydown",e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v)lookupPlayer(v);}});

async function lookupPlayer(idOrName){
  const result=document.getElementById("player-result");
  result.innerHTML='<div class="spinner"></div>';
  try{
    let userId=idOrName;
    if(!/^\d+$/.test(idOrName)){
      const sd=await fetch(POLY_API+"/users/find?username="+encodeURIComponent(idOrName)).then(r=>r.json());
      if(sd&&sd.id) userId=sd.id; else throw new Error("User not found");
    }
    const u=await fetch(POLY_API+"/users/"+userId).then(r=>r.json());
    if(u.message) throw new Error(u.message);
    result.innerHTML=`
      <div class="card">
        <div class="profile-header">
          <img class="profile-avatar" src="${esc(u.thumbnail||"")}" onerror="this.style.display='none'">
          <div class="profile-info">
            <h1>${esc(u.username)}</h1>
            <div class="join-date">ID: ${u.id}${u.registeredAt?" · Joined "+new Date(u.registeredAt).toLocaleDateString("en-US",{year:"numeric",month:"long"}):""}</div>
            ${u.description?'<p class="bio">'+esc(u.description)+'</p>':""}
          </div>
        </div>
        <div class="stat-grid">
          ${u.level!=null?'<div class="stat-box"><div class="stat-val" style="color:var(--accent2)">'+u.level+'</div><div class="stat-label">Level</div></div>':""}
          ${u.registeredAt?'<div class="stat-box"><div class="stat-val" style="font-size:13px">'+new Date(u.registeredAt).toLocaleDateString("en-US",{month:"short",year:"numeric"})+'</div><div class="stat-label">Joined</div></div>':""}
          ${u.lastSeenAt?'<div class="stat-box"><div class="stat-val" style="font-size:13px">'+new Date(u.lastSeenAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+'</div><div class="stat-label">Last Seen</div></div>':""}
        </div>
        <div style="text-align:center;margin-top:4px">
          <a href="https://polytoria.com/users/${u.id}" target="_blank" class="btn btn-primary" style="display:inline-block;text-decoration:none">View on Polytoria →</a>
        </div>
      </div>`;
  } catch(e){
    result.innerHTML='<div class="card"><div class="empty"><h3>User not found</h3><p>'+esc(e.message)+'</p></div></div>';
  }
}

// Trade ads
function renderTrades(){
  const list=document.getElementById("trade-list");
  if(!tradeAds.length){list.innerHTML='<div class="empty"><h3>No trade ads yet</h3><p>Post the first one above!</p></div>';return;}
  list.innerHTML=tradeAds.map((ad,i)=>`
    <div class="trade-ad">
      <div class="trade-items">${(ad.offer||[]).map(id=>`<img class="trade-item-mini" src="${esc(ad.offerThumbs?.[id]||"")}" title="ID: ${id}" onerror="this.style.background='var(--bg4)'">`).join("")}</div>
      <span class="trade-arrow">⇄</span>
      <div class="trade-items">${(ad.want||[]).map(id=>`<img class="trade-item-mini" src="${esc(ad.wantThumbs?.[id]||"")}" title="ID: ${id}" onerror="this.style.background='var(--bg4)'">`).join("")}</div>
      <div class="trade-user"><b>${esc(ad.username||"User "+ad.userId)}</b><span>ID: ${esc(String(ad.userId))}</span><br>
        <button onclick="removeTrade(${i})" style="margin-top:6px;background:none;border:none;color:var(--red);cursor:pointer;font-size:10px;font-family:inherit;padding:0">✕ Remove</button>
      </div>
    </div>`).join("");
}

document.getElementById("trade-post").addEventListener("click",async()=>{
  const offer=document.getElementById("trade-offer").value.split(",").map(s=>s.trim()).filter(Boolean);
  const want=document.getElementById("trade-want").value.split(",").map(s=>s.trim()).filter(Boolean);
  const userId=document.getElementById("trade-userid").value.trim();
  if(!offer.length||!want.length||!userId){alert("Fill in all fields.");return;}
  const btn=document.getElementById("trade-post");
  btn.disabled=true;btn.textContent="Posting...";
  const offerThumbs={},wantThumbs={};
  for(const id of [...new Set([...offer,...want])]){
    const c=itemCache[id];
    if(c){if(offer.includes(id))offerThumbs[id]=c.thumbnailUrl;if(want.includes(id))wantThumbs[id]=c.thumbnailUrl;}
  }
  tradeAds.unshift({offer,want,userId,username:"User "+userId,offerThumbs,wantThumbs,time:Date.now()});
  try{localStorage.setItem("pv_trades",JSON.stringify(tradeAds));}catch(e){}
  document.getElementById("trade-offer").value="";
  document.getElementById("trade-want").value="";
  btn.disabled=false;btn.textContent="Post Ad";
  renderTrades();
});

window.removeTrade=function(i){tradeAds.splice(i,1);try{localStorage.setItem("pv_trades",JSON.stringify(tradeAds));}catch(e){}renderTrades();};

loadItems();
renderTrades();
</script>
</body>
