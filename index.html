<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyValue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060e;--bg2:#0d0d1a;--bg3:#131325;--bg4:#1a1a30;--bg5:#22223c;
  --txt:#f0f0ff;--txt2:#6e6e9a;--txt3:#3a3a58;
  --accent:#7c6df0;--accent2:#b8adff;--accent3:#5040c8;
  --green:#00e898;--red:#f06858;--gold:#ffcc55;--orange:#ff9944;--blue:#55aaff;
  --border:#1c1c32;--radius:14px;
  --glow-rare:0 0 0 1px rgba(184,173,255,0.35),0 4px 32px rgba(124,109,240,0.2);
  --glow-hoarded:0 0 0 1px rgba(255,204,85,0.3),0 4px 32px rgba(255,170,0,0.15);
  --glow-projected:0 0 0 1px rgba(240,104,88,0.3),0 4px 32px rgba(240,80,60,0.15);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,232,152,0.6)}70%{box-shadow:0 0 0 6px rgba(0,232,152,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes popIn{0%{opacity:0;transform:scale(0.92)}100%{opacity:1;transform:scale(1)}}
@keyframes glow-pulse-rare{0%,100%{box-shadow:var(--glow-rare)}50%{box-shadow:0 0 0 1px rgba(184,173,255,0.5),0 6px 48px rgba(124,109,240,0.35)}}
@keyframes glow-pulse-gold{0%,100%{box-shadow:var(--glow-hoarded)}50%{box-shadow:0 0 0 1px rgba(255,204,85,0.5),0 6px 48px rgba(255,170,0,0.3)}}
@keyframes draw-line{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.fade-up{animation:fadeUp .35s ease both}
.pop-in{animation:popIn .28s cubic-bezier(.34,1.4,.64,1) both}

/* ── NAV ── */
.nav{background:rgba(6,6,14,0.88);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:58px;position:sticky;top:0;z-index:100;backdrop-filter:blur(28px) saturate(1.8)}
.nav-logo{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;margin-right:24px;display:flex;align-items:center;gap:9px;cursor:default;letter-spacing:-0.5px;user-select:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2.8s ease infinite}
.logo-poly{color:var(--accent2)}.logo-val{color:var(--txt)}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:7px 15px;border-radius:9px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;transition:.15s all;border:none;background:none;font-family:inherit;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:var(--txt);background:var(--bg3)}
.nav-tab.active{color:var(--accent2);background:rgba(124,109,240,0.1);box-shadow:inset 0 0 0 1px rgba(124,109,240,0.18)}
.nav-tab svg{opacity:.6;transition:.15s}
.nav-tab.active svg,.nav-tab:hover svg{opacity:1}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-wrap{position:relative}
.search-wrap input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 14px 8px 36px;color:var(--txt);font-size:13px;width:230px;outline:none;font-family:inherit;transition:.2s all}
.search-wrap input:focus{border-color:rgba(124,109,240,0.5);width:290px;background:var(--bg4);box-shadow:0 0 0 3px rgba(124,109,240,0.08)}
.search-wrap input::placeholder{color:var(--txt3)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}

/* ── LAYOUT ── */
.container{max-width:1300px;margin:0 auto;padding:28px 24px}
.page{display:none}.page.active{display:block}

/* ── CHIP FILTERS ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.search-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--txt);font-size:13px;outline:none;font-family:inherit;transition:.2s;width:200px}
.search-input:focus{border-color:rgba(124,109,240,0.4);background:var(--bg4)}
.search-input::placeholder{color:var(--txt3)}
.chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt3);transition:.15s all;letter-spacing:0.3px;display:inline-flex;align-items:center;gap:5px;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent2);background:rgba(124,109,240,0.05)}
.chip.active{color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.chip-valued.active{background:linear-gradient(135deg,#0a8f60,#00e898)}
.chip-hoarded.active{background:linear-gradient(135deg,#b87c10,#ffcc55);color:#1a0e00}
.chip-rare.active{background:linear-gradient(135deg,#5040c8,#b8adff)}
.chip-projected.active{background:linear-gradient(135deg,#c03030,#f06858)}

/* ── ITEM GRID ── */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:14px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.22s all;position:relative;animation:fadeUp .3s ease both}
.item-card:hover{transform:translateY(-4px) scale(1.01)}
.item-card.is-rare{box-shadow:var(--glow-rare);border-color:rgba(184,173,255,0.3)}
.item-card.is-rare:hover{animation:glow-pulse-rare 1.8s ease infinite}
.item-card.is-hoarded{box-shadow:var(--glow-hoarded);border-color:rgba(255,204,85,0.25)}
.item-card.is-hoarded:hover{animation:glow-pulse-gold 1.8s ease infinite}
.item-card.is-projected{box-shadow:var(--glow-projected);border-color:rgba(240,104,88,0.25)}
.item-card:nth-child(1){animation-delay:.02s}.item-card:nth-child(2){animation-delay:.04s}.item-card:nth-child(3){animation-delay:.06s}
.item-card:nth-child(4){animation-delay:.08s}.item-card:nth-child(5){animation-delay:.10s}.item-card:nth-child(6){animation-delay:.12s}
.item-card:nth-child(7){animation-delay:.14s}.item-card:nth-child(8){animation-delay:.16s}.item-card:nth-child(9){animation-delay:.18s}

.item-img-wrap{aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden}
.item-img-wrap::before{content:'';position:absolute;inset:0;opacity:0;transition:.3s}
.item-card:hover .item-img-wrap::before{opacity:1}
.item-img-wrap.bg-rare{background:linear-gradient(145deg,#100e28 0%,#1a1540 100%)}
.item-img-wrap.bg-rare::before{background:radial-gradient(circle at 50% 50%,rgba(124,109,240,0.12),transparent 70%)}
.item-img-wrap.bg-hoarded{background:linear-gradient(145deg,#180e02 0%,#221505 100%)}
.item-img-wrap.bg-hoarded::before{background:radial-gradient(circle at 50% 50%,rgba(255,180,0,0.1),transparent 70%)}
.item-img-wrap.bg-projected{background:linear-gradient(145deg,#1a0804 0%,#220a06 100%)}
.item-img-wrap.bg-projected::before{background:radial-gradient(circle at 50% 50%,rgba(240,80,40,0.1),transparent 70%)}
.item-img-wrap.bg-default{background:var(--bg3)}
.item-img{width:100%;height:100%;object-fit:contain;transition:.25s transform;position:relative;z-index:1}
.item-card:hover .item-img{transform:scale(1.06) translateY(-2px);animation:float 2.5s ease infinite}

/* corner pips */
.corner-pips{position:absolute;top:9px;right:9px;display:flex;flex-direction:column;gap:4px;z-index:2}
.cpip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cpip.rare{background:var(--accent2);box-shadow:0 0 7px var(--accent2)}
.cpip.hoarded{background:var(--gold);box-shadow:0 0 7px var(--gold)}
.cpip.projected{background:var(--red);box-shadow:0 0 7px var(--red)}
.cpip.unsettled{background:var(--orange);box-shadow:0 0 7px var(--orange)}

.item-info{padding:12px 14px 14px}
.item-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.item-aka{font-size:9px;color:var(--txt3);font-family:'Space Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px}
.item-nums{display:flex;justify-content:space-between;align-items:flex-end;gap:4px}
.item-rap{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--green)}
.item-val-wrap{text-align:right}
.item-val-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.3px}
.item-val-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);font-weight:700}
.item-tag-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.tpill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.3px}
.tpill-rare{background:rgba(184,173,255,0.1);color:var(--accent2);border:1px solid rgba(184,173,255,0.18)}
.tpill-hoarded{background:rgba(255,204,85,0.1);color:var(--gold);border:1px solid rgba(255,204,85,0.18)}
.tpill-projected{background:rgba(240,104,88,0.1);color:var(--red);border:1px solid rgba(240,104,88,0.18)}
.tpill-unsettled{background:rgba(255,153,68,0.1);color:var(--orange);border:1px solid rgba(255,153,68,0.18)}

/* ── SKELETON LOADER ── */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}

/* ── PAGINATION ── */
.pagination{display:flex;justify-content:center;align-items:center;gap:14px;padding:26px 0 8px}
.pginfo{font-size:11px;color:var(--txt3);font-family:'Space Mono',monospace;letter-spacing:0.3px}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s all;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,109,240,0.35)}
.btn-ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--txt);background:var(--bg4)}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ── INPUT ── */
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--txt);font-size:13px;width:100%;outline:none;font-family:inherit;transition:.2s all}
.inp:focus{border-color:rgba(124,109,240,0.4);background:var(--bg4);box-shadow:0 0 0 3px rgba(124,109,240,0.08)}
.inp::placeholder{color:var(--txt3)}
.lbl{font-size:10px;color:var(--txt3);display:block;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;justify-content:center;align-items:flex-start;padding:5vh 16px;backdrop-filter:blur(10px) saturate(1.5);overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:720px;max-width:100%;padding:0;position:relative;animation:popIn .28s cubic-bezier(.34,1.3,.64,1)}
.modal.is-rare{border-color:rgba(184,173,255,0.35);box-shadow:0 0 0 1px rgba(184,173,255,0.12),0 24px 64px rgba(80,64,200,0.25)}
.modal.is-hoarded{border-color:rgba(255,204,85,0.3);box-shadow:0 0 0 1px rgba(255,204,85,0.08),0 24px 64px rgba(180,120,0,0.2)}
.modal.is-projected{border-color:rgba(240,104,88,0.3);box-shadow:0 0 0 1px rgba(240,80,60,0.08),0 24px 64px rgba(200,50,30,0.2)}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg4);border:1px solid var(--border);color:var(--txt2);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s;z-index:10;line-height:1}
.modal-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.modal-hero{padding:28px 28px 20px;display:flex;gap:22px;align-items:flex-start}
.modal-thumb-wrap{width:160px;height:160px;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:14px;flex-shrink:0}
.modal-thumb-wrap.bg-rare{background:linear-gradient(145deg,#0e0c24,#1a1540)}
.modal-thumb-wrap.bg-hoarded{background:linear-gradient(145deg,#160c02,#201404)}
.modal-thumb-wrap.bg-projected{background:linear-gradient(145deg,#180604,#220806)}
.modal-thumb-wrap.bg-default{background:var(--bg3)}
.modal-thumb{width:100%;height:100%;object-fit:contain}
.modal-meta{flex:1;min-width:0}
.modal-name{font-size:22px;font-weight:700;line-height:1.25;margin-bottom:3px}
.modal-aka{font-size:11px;color:var(--txt3);font-family:'Space Mono',monospace;margin-bottom:12px}
.modal-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.2px}
.b-demand-high{background:rgba(0,232,152,0.12);color:var(--green);border:1px solid rgba(0,232,152,0.2)}
.b-demand-normal{background:rgba(184,173,255,0.1);color:var(--accent2);border:1px solid rgba(184,173,255,0.18)}
.b-demand-low{background:rgba(240,104,88,0.1);color:var(--red);border:1px solid rgba(240,104,88,0.18)}
.b-trend-rising{background:rgba(0,232,152,0.1);color:var(--green);border:1px solid rgba(0,232,152,0.18)}
.b-trend-stable{background:rgba(124,109,240,0.08);color:var(--accent2);border:1px solid rgba(124,109,240,0.15)}
.b-trend-unstable{background:rgba(240,104,88,0.1);color:var(--red);border:1px solid rgba(240,104,88,0.18)}
.funfact{font-size:12px;color:var(--gold);background:rgba(255,204,85,0.07);border:1px solid rgba(255,204,85,0.15);border-radius:10px;padding:10px 13px;line-height:1.6;margin-top:10px}

/* stat row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 28px 20px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:14px;text-align:center}
.stat-val{font-family:'Space Mono',monospace;font-size:17px;font-weight:700}
.stat-lbl{font-size:9px;color:var(--txt3);margin-top:5px;text-transform:uppercase;letter-spacing:0.6px}

/* ── RAP GRAPH ── */
.graph-section{padding:0 28px 24px}
.graph-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.graph-title{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px}
.graph-pill{font-size:9px;padding:2px 8px;border-radius:10px;background:var(--bg4);color:var(--txt3);border:1px solid var(--border)}
.graph-wrap{position:relative;height:160px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.graph-wrap.loading{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
.graph-svg{width:100%;height:100%;display:block}
.graph-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1000;stroke-dashoffset:0;animation:draw-line 1.2s ease both}
.graph-area{opacity:0.18}
.graph-tooltip{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:11px;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.4);opacity:0;transition:.1s opacity;z-index:10}
.graph-tooltip.show{opacity:1}
.graph-crosshair{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.1);pointer-events:none;display:none}

/* owners strip */
.owners-section{padding:0 28px 20px}
.owners-title{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.owners-row{display:flex;gap:8px;flex-wrap:wrap}
.owner-chip{display:inline-flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:6px 11px;font-size:11px;transition:.15s}
.owner-chip:hover{border-color:rgba(124,109,240,0.3);background:var(--bg4)}
.owner-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3);margin-left:2px}

.modal-divider{height:1px;background:var(--border);margin:0 28px 20px}

.modal-links{padding:0 28px 28px;display:flex;gap:8px}

/* ── TRADE ADS ── */
.trade-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px;transition:.2s;animation:fadeUp .3s ease both}
.trade-card:hover{border-color:rgba(124,109,240,0.25);box-shadow:0 4px 24px rgba(124,109,240,0.07)}
.trade-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.trade-user-row{display:flex;align-items:center;gap:9px}
.trade-avatar{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent3),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.trade-username{font-size:14px;font-weight:700}
.trade-time{font-size:10px;color:var(--txt3);font-family:'Space Mono',monospace}
.trade-body{display:grid;grid-template-columns:1fr 44px 1fr;gap:12px;align-items:start}
.trade-side-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--txt3);margin-bottom:8px}
.trade-items-wrap{display:flex;flex-direction:column;gap:6px}
.titem{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 11px;cursor:pointer;transition:.15s}
.titem:hover{border-color:rgba(124,109,240,0.3);background:var(--bg4)}
.titem.is-rare{border-color:rgba(184,173,255,0.25);background:rgba(184,173,255,0.04)}
.titem.is-hoarded{border-color:rgba(255,204,85,0.25);background:rgba(255,204,85,0.04)}
.titem.is-projected{border-color:rgba(240,104,88,0.25);background:rgba(240,104,88,0.04)}
.titem-thumb{width:38px;height:38px;border-radius:8px;object-fit:contain;background:var(--bg4);padding:2px;flex-shrink:0}
.titem-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.titem-rap{font-size:10px;color:var(--green);font-family:'Space Mono',monospace;flex-shrink:0}
.trade-arrow-col{display:flex;align-items:center;justify-content:center;padding-top:28px}
.trade-divider-icon{width:28px;height:28px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--txt3)}
.trade-foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--border)}
.trade-rap-compare{display:flex;align-items:center;gap:10px}
.rap-bar-wrap{width:80px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.rap-bar{height:100%;border-radius:3px;transition:width .6s ease}
.trade-rap-txt{font-size:10px;color:var(--txt3)}
.trade-rap-txt span{font-family:'Space Mono',monospace;font-weight:700}
.trade-remove{background:none;border:none;color:var(--txt3);cursor:pointer;padding:4px 8px;border-radius:6px;font-size:11px;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:4px}
.trade-remove:hover{color:var(--red);background:rgba(240,104,88,0.08)}

/* item picker */
.picker-row{display:flex;gap:6px;margin-bottom:8px}
.picker-chips{display:flex;flex-wrap:wrap;gap:6px;min-height:10px}
.pchip{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:11px;animation:popIn .2s ease}
.pchip img{width:26px;height:26px;border-radius:5px;object-fit:contain}
.pchip-name{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.pchip-x{background:none;border:none;color:var(--txt3);cursor:pointer;padding:0;font-size:15px;line-height:1;transition:.12s}
.pchip-x:hover{color:var(--red)}
.trade-err{font-size:11px;color:var(--red);margin-top:6px;display:none}

/* ── PROFILE ── */
.profile-hdr{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px}
.profile-avatar{width:90px;height:90px;border-radius:16px;background:var(--bg3);object-fit:cover;flex-shrink:0;border:2px solid var(--border)}
.profile-name{font-size:24px;font-weight:700;margin-bottom:3px}
.profile-sub{font-size:11px;color:var(--txt3);margin-bottom:8px}
.profile-bio{font-size:13px;color:var(--txt2);line-height:1.6;max-width:460px;margin-top:6px}

/* cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
.card-title{font-size:14px;font-weight:700;margin-bottom:16px}

.empty{text-align:center;padding:64px 20px}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.empty h3{color:var(--txt2);margin-bottom:6px;font-size:15px;font-weight:600}
.empty p{font-size:12px;color:var(--txt3)}
.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:48px auto}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}

@media(max-width:760px){
.nav{padding:0 14px}.nav-tabs .nav-tab span{display:none}
.search-wrap input{width:120px}.search-wrap input:focus{width:160px}
.item-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.trade-body{grid-template-columns:1fr 28px 1fr}
.modal-hero{flex-direction:column}.modal-thumb-wrap{width:100%;height:180px;border-radius:12px}
.stat-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><span class="logo-dot"></span><span class="logo-poly">Poly</span><span class="logo-val">Value</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="items">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Limiteds</span>
    </button>
    <button class="nav-tab" data-page="trades">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
      <span>Trade Ads</span>
    </button>
    <button class="nav-tab" data-page="players">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Players</span>
    </button>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="global-search" placeholder="Search items…">
    </div>
  </div>
</nav>

<div class="container">

  <!-- LIMITEDS -->
  <div class="page active" id="page-items">
    <div class="filter-bar">
      <input class="search-input" id="item-search" placeholder="Search limiteds…">
      <span class="chip chip-valued" id="chip-valued">Has Value</span>
      <span class="chip chip-hoarded" id="chip-hoarded">Hoarded</span>
      <span class="chip chip-rare" id="chip-rare">Rare</span>
      <span class="chip chip-projected" id="chip-projected">Projected</span>
      <span class="pginfo" id="pginfo" style="margin-left:auto"></span>
    </div>
    <div id="items-grid" class="item-grid"></div>
    <div class="pagination">
      <button class="btn btn-ghost" id="btn-prev" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Prev
      </button>
      <span class="pginfo" id="pginfo2"></span>
      <button class="btn btn-ghost" id="btn-next">
        Next <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <!-- TRADES -->
  <div class="page" id="page-trades">
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">Post Trade Ad</div>
      <div style="display:grid;grid-template-columns:1fr 44px 1fr;gap:14px;align-items:start">
        <div>
          <label class="lbl">Offering</label>
          <div class="picker-row"><input class="inp" id="offer-input" placeholder="Item ID…" style="flex:1"><button class="btn btn-ghost btn-sm" id="offer-add">Add</button></div>
          <div class="picker-chips" id="offer-chips"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;padding-top:26px">
          <div style="width:28px;height:28px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--txt3)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
          </div>
        </div>
        <div>
          <label class="lbl">Wants</label>
          <div class="picker-row"><input class="inp" id="want-input" placeholder="Item ID…" style="flex:1"><button class="btn btn-ghost btn-sm" id="want-add">Add</button></div>
          <div class="picker-chips" id="want-chips"></div>
        </div>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;align-items:flex-end">
        <div style="flex:1"><label class="lbl">Your Username</label><input class="inp" id="trade-username" placeholder="e.g. annul"></div>
        <button class="btn btn-primary" id="trade-post">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Post Ad
        </button>
      </div>
      <div class="trade-err" id="trade-err"></div>
    </div>
    <div id="trade-list"></div>
  </div>

  <!-- PLAYERS -->
  <div class="page" id="page-players">
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">Player Lookup</div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="player-input" placeholder="Username or user ID" style="flex:1">
        <button class="btn btn-primary" id="player-btn">Look Up</button>
      </div>
    </div>
    <div id="player-result"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <button class="modal-close" id="modal-close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="modal-content"></div>
  </div>
</div>

<div class="graph-tooltip" id="graph-tooltip"></div>
<div class="graph-crosshair" id="graph-crosshair"></div>

<script>
const PROXY = "https://polyvalue.onrender.com";
const T = PROXY + "/trade/api/trpc/";
const POLY = "https://api.polytoria.com/v1";

// ── Utils ──
const esc=s=>{const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML};
const num=n=>n==null||n===""?"—":Number(n).toLocaleString();
const timeAgo=ms=>{const s=Math.floor((Date.now()-ms)/1000);if(s<60)return s+"s ago";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago"};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ── Tag helpers ──
const TAG_TO_CLS={Hoarded:"hoarded",Projected:"projected",Rare:"rare",Unsettled:"unsettled"};
const TAG_PILL_CLS={hoarded:"tpill-hoarded",projected:"tpill-projected",rare:"tpill-rare",unsettled:"tpill-unsettled"};
const CPIP_CLS={hoarded:"hoarded",projected:"projected",rare:"rare",unsettled:"unsettled"};

function getCardCls(tags,allTags){
  if(!tags?.length) return "";
  const names=tags.map(t=>allTags.find(a=>a.id===t.tagId)?.name||"");
  if(names.includes("Rare")) return "is-rare";
  if(names.includes("Projected")) return "is-projected";
  if(names.includes("Hoarded")) return "is-hoarded";
  return "";
}
function getBgCls(cc){return cc?cc.replace("is-",""):"default";}
function tagPills(tags,allTags){
  if(!tags?.length) return "";
  return tags.map(t=>{
    const d=allTags.find(a=>a.id===t.tagId);if(!d) return "";
    const c=TAG_PILL_CLS[TAG_TO_CLS[d.name]||"hoarded"];
    return `<span class="tpill ${c}">${esc(d.name)}</span>`;
  }).join("");
}
function cornerPips(tags,allTags){
  if(!tags?.length) return "";
  return tags.map(t=>{
    const d=allTags.find(a=>a.id===t.tagId);if(!d) return "";
    return `<span class="cpip ${CPIP_CLS[TAG_TO_CLS[d.name]||"hoarded"]||"hoarded"}"></span>`;
  }).join("");
}

// ── State ──
let pg=1,totalPg=1,allTags=[],itemCache={};
let fValued=false,fHoarded=false,fRare=false,fProjected=false,sq="";
let offerItems=[],wantItems=[],tradeAds=[];
try{tradeAds=JSON.parse(localStorage.getItem("pv3_trades")||"[]")}catch(e){}

// ── Nav ──
document.querySelectorAll(".nav-tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("page-"+btn.dataset.page).classList.add("active");
  });
});

document.getElementById("global-search").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  const q=e.target.value.trim();if(!q) return;
  document.getElementById("item-search").value=q;
  sq=q;pg=1;
  document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelector('[data-page="items"]').classList.add("active");
  document.getElementById("page-items").classList.add("active");
  loadItems();
});

let st;
document.getElementById("item-search").addEventListener("input",e=>{clearTimeout(st);st=setTimeout(()=>{sq=e.target.value.trim();pg=1;loadItems();},300);});

["valued","hoarded","rare","projected"].forEach(k=>{
  document.getElementById("chip-"+k).addEventListener("click",function(){
    if(k==="valued")fValued=!fValued,this.classList.toggle("active",fValued);
    if(k==="hoarded")fHoarded=!fHoarded,this.classList.toggle("active",fHoarded);
    if(k==="rare")fRare=!fRare,this.classList.toggle("active",fRare);
    if(k==="projected")fProjected=!fProjected,this.classList.toggle("active",fProjected);
    pg=1;loadItems();
  });
});
document.getElementById("btn-prev").addEventListener("click",()=>{if(pg>1){pg--;loadItems();}});
document.getElementById("btn-next").addEventListener("click",()=>{if(pg<totalPg){pg++;loadItems();}});

// ── Fetch helpers ──
async function apiFetch(path,body){
  const opts={method:body?"POST":"GET",headers:{"content-type":"application/json"}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(T+path,opts);
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

async function fetchPage(page,search){
  const j=await apiFetch("getItemsByPage?batch=1",{"0":{page,total:24,search:search||"",homepage:false}});
  return j[0].result.data;
}

async function fetchItemGraph(id){
  const url=T+`getItemWithTags,getItemGraph?batch=1&input=${encodeURIComponent(JSON.stringify({"0":id,"1":id}))}`;
  const r=await fetch(url,{headers:{"content-type":"application/json"}});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json(); // [{result:{data:item}},{result:{data:graph[]}}]
}

async function fetchOwners(id){
  const url=T+`getAllItemOwners,getRecentItemHistory?batch=1&input=${encodeURIComponent(JSON.stringify({"0":id,"1":id}))}`;
  const r=await fetch(url,{headers:{"content-type":"application/json"}});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

// ── Load items ──
async function loadItems(){
  const grid=document.getElementById("items-grid");
  // skeleton
  grid.innerHTML=Array(12).fill(`<div class="item-card" style="pointer-events:none">
    <div style="aspect-ratio:1"><div class="skeleton" style="width:100%;height:100%"></div></div>
    <div class="item-info"><div class="skeleton" style="height:12px;width:80%;margin-bottom:8px"></div><div class="skeleton" style="height:10px;width:50%"></div></div>
  </div>`).join("");
  try{
    const data=await fetchPage(pg,sq);
    allTags=data.allTags||[];totalPg=data.totalPages||1;
    let items=data.items||[];
    items.forEach(i=>itemCache[i.id]=i);
    if(fValued) items=items.filter(i=>i.stats?.value!=null);
    if(fHoarded) items=items.filter(i=>hasTag(i,"Hoarded"));
    if(fRare) items=items.filter(i=>hasTag(i,"Rare"));
    if(fProjected) items=items.filter(i=>hasTag(i,"Projected"));
    grid.innerHTML="";
    if(!items.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">◈</div><h3>Nothing here</h3><p>Try different filters</p></div>';return;}
    items.forEach((item,idx)=>{
      const w=document.createElement("div");
      w.innerHTML=renderCard(item,idx);
      grid.appendChild(w.firstChild);
    });
    const t=`Page ${pg} / ${totalPg}`;
    document.getElementById("pginfo").textContent=t;
    document.getElementById("pginfo2").textContent=t;
    document.getElementById("btn-prev").style.display=pg>1?"":"none";
    document.getElementById("btn-next").style.display=pg<totalPg?"":"none";
  }catch(e){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠</div><h3>Load failed</h3><p>${esc(e.message)}</p></div>`;}
}

function hasTag(item,name){return item.tags?.some(t=>allTags.find(a=>a.id===t.tagId)?.name===name);}

function renderCard(item,idx=0){
  const cc=getCardCls(item.tags,allTags);
  const bg=getBgCls(cc);
  const pips=cornerPips(item.tags,allTags);
  const pills=tagPills(item.tags,allTags);
  return `<div class="item-card ${cc}" onclick="openModal(${item.id})" style="animation-delay:${idx*0.03}s">
    <div class="item-img-wrap bg-${bg}">
      <img class="item-img" src="${esc(item.thumbnailUrl||"")}" loading="lazy" alt="" onerror="this.style.opacity=.15">
      ${pips?`<div class="corner-pips">${pips}</div>`:""}
    </div>
    <div class="item-info">
      <div class="item-name" title="${esc(item.name)}">${esc(item.name)}</div>
      ${item.shorthand?`<div class="item-aka">${esc(item.shorthand)}</div>`:""}
      <div class="item-nums">
        <div class="item-rap">${item.recentAverage!=null?num(item.recentAverage):"—"}</div>
        ${item.stats?.value!=null?`<div class="item-val-wrap"><div class="item-val-lbl">val</div><div class="item-val-num">${num(item.stats.value)}</div></div>`:""}
      </div>
      ${pills?`<div class="item-tag-row">${pills}</div>`:""}
    </div>
  </div>`;
}

// ── Modal ──
window.openModal=async function(id){
  const overlay=document.getElementById("modal-overlay");
  const box=document.getElementById("modal-box");
  const content=document.getElementById("modal-content");
  overlay.classList.add("open");
  box.className="modal";

  const cached=itemCache[id];
  if(cached){
    const cc=getCardCls(cached.tags,allTags);
    box.className="modal"+(cc?" "+cc:"");
    renderModalShell(cached,content,cc);
  } else {
    content.innerHTML='<div class="spinner" style="margin:60px auto"></div>';
  }

  // Load graph + owners in parallel
  try{
    const [graphRes,ownersRes]=await Promise.all([fetchItemGraph(id),fetchOwners(id)]);
    const graphData=graphRes[1]?.result?.data||[];
    const ownersData=ownersRes[0]?.result?.data||[];
    const historyData=ownersRes[1]?.result?.data||[];
    const item=graphRes[0]?.result?.data||cached;
    if(item){itemCache[item.id]=item;}
    const cc=getCardCls(item?.tags||[],allTags);
    box.className="modal"+(cc?" "+cc:"");
    renderModalFull(item||cached,content,cc,graphData,ownersData,historyData);
  }catch(e){
    if(cached) renderModalFull(cached,content,getCardCls(cached.tags,allTags),[],[],[]);
  }
};

function renderModalShell(item,content,cc){
  const bg=getBgCls(cc);
  const pills=tagPills(item.tags||[],allTags);
  content.innerHTML=`
    <div class="modal-hero">
      <div class="modal-thumb-wrap bg-${bg}">
        <img class="modal-thumb" src="${esc(item.thumbnailUrl||"")}" alt="" onerror="this.style.opacity=.15">
      </div>
      <div class="modal-meta">
        <div class="modal-name">${esc(item.name)}</div>
        ${item.shorthand?`<div class="modal-aka">aka ${esc(item.shorthand)}</div>`:""}
        <div class="modal-badges">${pills}</div>
        ${item.stats?.funFact?`<div class="funfact">${esc(item.stats.funFact)}</div>`:""}
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" style="color:var(--green)">${num(item.recentAverage)}</div><div class="stat-lbl">RAP</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--accent2)">${item.stats?.value!=null?num(item.stats.value):"—"}</div><div class="stat-lbl">Value</div></div>
      <div class="stat-box"><div class="stat-val" style="font-size:13px">${item.stats?.demand||"—"}</div><div class="stat-lbl">Demand</div></div>
      <div class="stat-box"><div class="stat-val" style="font-size:13px">${item.stats?.trend||"—"}</div><div class="stat-lbl">Trend</div></div>
    </div>
    <div class="graph-section"><div class="graph-wrap loading" id="modal-graph" style="height:150px"></div></div>
    <div class="modal-links">
      <a href="https://polytoria.com/store/${item.id}" target="_blank" class="btn btn-primary" style="text-decoration:none;flex:1;justify-content:center">View on Polytoria</a>
      <a href="https://polytoria.trade/store/${item.id}" target="_blank" class="btn btn-ghost" style="text-decoration:none">polytoria.trade ↗</a>
    </div>`;
}

function renderModalFull(item,content,cc,graphData,ownersData,historyData){
  const bg=getBgCls(cc);
  const demand=item?.stats?.demand||"";
  const trend=item?.stats?.trend||"";
  const pills=tagPills(item?.tags||[],allTags);

  content.innerHTML=`
    <div class="modal-hero fade-up">
      <div class="modal-thumb-wrap bg-${bg}">
        <img class="modal-thumb" src="${esc(item?.thumbnailUrl||"")}" alt="" onerror="this.style.opacity=.15">
      </div>
      <div class="modal-meta">
        <div class="modal-name">${esc(item?.name||"")}</div>
        ${item?.shorthand?`<div class="modal-aka">aka ${esc(item.shorthand)}</div>`:""}
        <div class="modal-badges">
          ${pills}
          ${demand?`<span class="badge b-demand-${demand}">
            ${demand==="high"?svgIcon("trending-up"):demand==="low"?svgIcon("trending-down"):svgIcon("minus")}
            ${esc(demand)}
          </span>`:""}
          ${trend?`<span class="badge b-trend-${trend}">
            ${trend==="rising"?svgIcon("arrow-up"):trend==="unstable"?svgIcon("zap"):svgIcon("minus")}
            ${esc(trend)}
          </span>`:""}
        </div>
        ${item?.stats?.funFact?`<div class="funfact">${esc(item.stats.funFact)}</div>`:""}
      </div>
    </div>
    <div class="stat-row fade-up" style="animation-delay:.05s">
      <div class="stat-box">
        <div class="stat-val" style="color:var(--green)">${num(item?.recentAverage)}</div>
        <div class="stat-lbl">RAP</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--accent2)">${item?.stats?.value!=null?num(item.stats.value):"—"}</div>
        <div class="stat-lbl">Est. Value</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="font-size:13px;color:${demand==="high"?"var(--green)":demand==="low"?"var(--red)":"var(--txt2)"}">${demand||"—"}</div>
        <div class="stat-lbl">Demand</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="font-size:13px;color:${trend==="rising"?"var(--green)":trend==="unstable"?"var(--red)":"var(--txt2)"}">${trend||"—"}</div>
        <div class="stat-lbl">Trend</div>
      </div>
    </div>
    <div class="graph-section fade-up" style="animation-delay:.1s">
      <div class="graph-header">
        <div class="graph-title">${svgIcon("activity")} RAP History
          <span class="graph-pill">${graphData.length} data points</span>
        </div>
      </div>
      <div class="graph-wrap" id="modal-graph"></div>
    </div>
    ${ownersData.length?`
    <div class="owners-section fade-up" style="animation-delay:.15s">
      <div class="owners-title">${svgIcon("users")} Owners <span class="graph-pill">${ownersData.length} unique</span></div>
      <div class="owners-row">${ownersData.slice(0,12).map(o=>`
        <div class="owner-chip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span>${esc(o.username||o.userId)}</span>
          <span class="owner-count">×${o.count||1}</span>
        </div>`).join("")}
      </div>
    </div>`:""}
    <div class="modal-divider"></div>
    <div class="modal-links fade-up" style="animation-delay:.2s">
      <a href="https://polytoria.com/store/${item?.id}" target="_blank" class="btn btn-primary" style="text-decoration:none;flex:1;justify-content:center">
        ${svgIcon("external-link")} View on Polytoria
      </a>
      <a href="https://polytoria.trade/store/${item?.id}" target="_blank" class="btn btn-ghost" style="text-decoration:none">
        polytoria.trade ↗
      </a>
    </div>`;

  // Draw graph
  if(graphData.length>1){
    drawGraph(document.getElementById("modal-graph"), graphData, cc);
  } else if(graphData.length===0){
    document.getElementById("modal-graph").innerHTML=`<div class="empty" style="padding:32px"><p>No historical data yet</p></div>`;
  }
}

// ── SVG Graph ──
function drawGraph(container, rawData, cc){
  const W=container.clientWidth||640;
  const H=container.clientHeight||150;
  const PAD={top:14,right:16,bottom:28,left:52};

  // Sort by date
  const pts=rawData.map(d=>({
    t:new Date(d.date||d.createdAt||d.timestamp||0).getTime(),
    v:Number(d.value||d.averagePrice||d.rap||0)
  })).filter(d=>d.t>0&&d.v>0).sort((a,b)=>a.t-b.t);

  if(pts.length<2){container.innerHTML=`<div class="empty" style="padding:32px"><p>Not enough data</p></div>`;return;}

  const minV=Math.min(...pts.map(p=>p.v))*0.95;
  const maxV=Math.max(...pts.map(p=>p.v))*1.05;
  const minT=pts[0].t, maxT=pts[pts.length-1].t;

  const xS=t=>PAD.left+(t-minT)/(maxT-minT||1)*(W-PAD.left-PAD.right);
  const yS=v=>PAD.top+(1-(v-minV)/(maxV-minV||1))*(H-PAD.top-PAD.bottom);

  const color=cc==="is-rare"?"#b8adff":cc==="is-hoarded"?"#ffcc55":cc==="is-projected"?"#f06858":"#7c6df0";

  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${xS(p.t).toFixed(1)},${yS(p.v).toFixed(1)}`).join(" ");
  const areaD=pathD+` L${xS(maxT).toFixed(1)},${yS(minV).toFixed(1)} L${xS(minT).toFixed(1)},${yS(minV).toFixed(1)} Z`;

  // Y-axis ticks
  const yTicks=[0,.25,.5,.75,1].map(f=>minV+f*(maxV-minV));
  const yTickSvg=yTicks.map(v=>`
    <line x1="${PAD.left}" y1="${yS(v).toFixed(1)}" x2="${W-PAD.right}" y2="${yS(v).toFixed(1)}" stroke="var(--bg5)" stroke-width="1"/>
    <text x="${PAD.left-6}" y="${(yS(v)+4).toFixed(1)}" fill="var(--txt3)" font-size="9" text-anchor="end" font-family="Space Mono">${shortNum(v)}</text>`).join("");

  container.innerHTML=`<svg class="graph-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${yTickSvg}
    <path d="${areaD}" fill="url(#gfill)" class="graph-area"/>
    <path d="${pathD}" stroke="${color}" class="graph-line"/>
    ${pts.map((p,i)=>{
      if(i===0||i===pts.length-1||i%Math.ceil(pts.length/8)===0)
        return `<circle cx="${xS(p.t).toFixed(1)}" cy="${yS(p.v).toFixed(1)}" r="3" fill="${color}" stroke="var(--bg2)" stroke-width="1.5"/>`;
      return "";
    }).join("")}
  </svg>`;

  // Hover interaction
  const svg=container.querySelector("svg");
  const tip=document.getElementById("graph-tooltip");
  const cross=document.getElementById("graph-crosshair");

  svg.addEventListener("mousemove",e=>{
    const rect=container.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const pct=(mx-PAD.left)/(W-PAD.left-PAD.right);
    const t=minT+pct*(maxT-minT);
    // Find nearest point
    const near=pts.reduce((a,b)=>Math.abs(b.t-t)<Math.abs(a.t-t)?b:a);
    const px=xS(near.t);
    const py=yS(near.v);
    const date=new Date(near.t).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    tip.innerHTML=`<div style="font-family:'Space Mono',monospace;font-size:11px;color:${color};font-weight:700">${num(near.v)}</div><div style="font-size:10px;color:var(--txt3);margin-top:2px">${date}</div>`;
    tip.classList.add("show");
    const tipW=tip.offsetWidth,tipH=tip.offsetHeight;
    tip.style.left=(rect.left+px-tipW/2)+"px";
    tip.style.top=(rect.top+py-tipH-10)+"px";
    cross.style.display="block";
    cross.style.left=(rect.left+px)+"px";
    cross.style.top=rect.top+"px";
    cross.style.height=rect.height+"px";
  });
  svg.addEventListener("mouseleave",()=>{tip.classList.remove("show");cross.style.display="none";});
}

function shortNum(n){
  if(n>=1e6) return (n/1e6).toFixed(1)+"M";
  if(n>=1e3) return (n/1e3).toFixed(1)+"K";
  return Math.round(n).toString();
}

// ── Close modal ──
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");document.getElementById("modal-box").className="modal";document.getElementById("graph-tooltip").classList.remove("show");}
document.getElementById("modal-close").addEventListener("click",closeModal);
document.getElementById("modal-overlay").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

// ── Item picker for trade ads ──
async function addItem(side){
  const inp=document.getElementById(side+"-input");
  const id=inp.value.trim();
  const errEl=document.getElementById("trade-err");
  if(!id){showErr("Enter an item ID.");return;}
  const list=side==="offer"?offerItems:wantItems;
  if(list.find(i=>String(i.id)===String(id))){showErr("Already added.");return;}
  inp.disabled=true;errEl.style.display="none";
  try{
    // Search by ID
    const j=await apiFetch("getItemsByPage?batch=1",{"0":{page:1,total:1,search:String(id),homepage:false}});
    const data=j[0].result.data;
    if(allTags.length===0&&data.allTags) allTags=data.allTags;
    const item=(data.items||[]).find(i=>String(i.id)===String(id));
    if(!item){showErr(`Item ID ${id} not found.`);return;}
    itemCache[item.id]=item;
    list.push(item);
    renderChips(side);
    inp.value="";
  }catch(e){showErr("Error: "+e.message);}
  finally{inp.disabled=false;inp.focus();}
}

function showErr(m){const e=document.getElementById("trade-err");e.textContent=m;e.style.display=m?"":"none";}

document.getElementById("offer-add").addEventListener("click",()=>addItem("offer"));
document.getElementById("want-add").addEventListener("click",()=>addItem("want"));
document.getElementById("offer-input").addEventListener("keydown",e=>{if(e.key==="Enter")addItem("offer");});
document.getElementById("want-input").addEventListener("keydown",e=>{if(e.key==="Enter")addItem("want");});

function renderChips(side){
  const list=side==="offer"?offerItems:wantItems;
  document.getElementById(side+"-chips").innerHTML=list.map((it,i)=>`
    <div class="pchip">
      <img src="${esc(it.thumbnailUrl||"")}" onerror="this.style.opacity=.15">
      <span class="pchip-name" title="${esc(it.name)}">${esc(it.name)}</span>
      <button class="pchip-x" onclick="removeItem('${side}',${i})">×</button>
    </div>`).join("");
}

window.removeItem=function(side,i){(side==="offer"?offerItems:wantItems).splice(i,1);renderChips(side);};

// ── Post trade ──
document.getElementById("trade-post").addEventListener("click",()=>{
  const username=document.getElementById("trade-username").value.trim();
  showErr("");
  if(!offerItems.length||!wantItems.length){showErr("Add at least one item per side.");return;}
  if(!username){showErr("Enter your username.");return;}
  const snap=items=>items.map(i=>({id:i.id,name:i.name,thumbnailUrl:i.thumbnailUrl,rap:i.recentAverage,tags:i.tags,stats:i.stats}));
  tradeAds.unshift({offer:snap(offerItems),want:snap(wantItems),username,time:Date.now()});
  try{localStorage.setItem("pv3_trades",JSON.stringify(tradeAds));}catch(e){}
  offerItems=[];wantItems=[];
  renderChips("offer");renderChips("want");
  document.getElementById("trade-username").value="";
  renderTrades();
});

// ── Render trades ──
function renderTrades(){
  const list=document.getElementById("trade-list");
  if(!tradeAds.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">⇄</div><h3>No trade ads yet</h3><p>Post the first one above!</p></div>`;
    return;
  }
  list.innerHTML=tradeAds.map((ad,i)=>{
    const oRap=ad.offer.reduce((s,it)=>s+(it.rap||0),0);
    const wRap=ad.want.reduce((s,it)=>s+(it.rap||0),0);
    const diff=wRap>0?Math.round((oRap-wRap)/wRap*100):null;
    const barW=diff!==null?Math.min(100,Math.abs(diff)):0;
    return `<div class="trade-card">
      <div class="trade-top">
        <div class="trade-user-row">
          <div class="trade-avatar">${esc((ad.username||"?")[0].toUpperCase())}</div>
          <div>
            <div class="trade-username">${esc(ad.username)}</div>
            <div class="trade-time">${timeAgo(ad.time)}</div>
          </div>
        </div>
        <button class="trade-remove" onclick="removeTrade(${i})">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Remove
        </button>
      </div>
      <div class="trade-body">
        <div>
          <div class="trade-side-lbl">Offering</div>
          <div class="trade-items-wrap">${ad.offer.map(it=>tradeItem(it)).join("")}</div>
        </div>
        <div class="trade-arrow-col">
          <div class="trade-divider-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
          </div>
        </div>
        <div>
          <div class="trade-side-lbl">Wants</div>
          <div class="trade-items-wrap">${ad.want.map(it=>tradeItem(it)).join("")}</div>
        </div>
      </div>
      <div class="trade-foot">
        <div class="trade-rap-compare">
          <div class="rap-bar-wrap"><div class="rap-bar" style="width:${barW}%;background:${diff>=0?"var(--green)":"var(--red)"}"></div></div>
          <span class="trade-rap-txt" style="color:${diff>=0?"var(--green)":"var(--red)"}">
            ${diff!==null?(diff>=0?"▲ +":"▼ ")+diff+"%":""}
          </span>
        </div>
        <div style="display:flex;gap:16px">
          <div class="trade-rap-txt">Offer: <span>${num(oRap)}</span></div>
          <div class="trade-rap-txt">Ask: <span>${num(wRap)}</span></div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function tradeItem(it){
  const cc=getCardCls(it.tags||[],allTags);
  return `<div class="titem ${cc}" onclick="openModal(${it.id})">
    <img class="titem-thumb" src="${esc(it.thumbnailUrl||"")}" onerror="this.style.opacity=.15">
    <div class="titem-name" title="${esc(it.name)}">${esc(it.name)}</div>
    ${it.rap!=null?`<div class="titem-rap">${num(it.rap)}</div>`:""}
  </div>`;
}

window.removeTrade=function(i){tradeAds.splice(i,1);try{localStorage.setItem("pv3_trades",JSON.stringify(tradeAds));}catch(e){}renderTrades();};

// ── Player lookup ──
document.getElementById("player-btn").addEventListener("click",()=>{const v=document.getElementById("player-input").value.trim();if(v)lookupPlayer(v);});
document.getElementById("player-input").addEventListener("keydown",e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v)lookupPlayer(v);}});

async function lookupPlayer(q){
  const r=document.getElementById("player-result");
  r.innerHTML='<div class="spinner"></div>';
  try{
    let uid=q;
    if(!/^\d+$/.test(q)){
      const sd=await fetch(POLY+"/users/find?username="+encodeURIComponent(q)).then(r=>r.json());
      if(sd?.id) uid=sd.id; else throw new Error("User not found");
    }
    const u=await fetch(POLY+"/users/"+uid).then(r=>r.json());
    if(u.message) throw new Error(u.message);
    r.innerHTML=`<div class="card">
      <div class="profile-hdr">
        <img class="profile-avatar" src="${esc(u.thumbnail||"")}" onerror="this.style.display='none'">
        <div>
          <div class="profile-name">${esc(u.username)}</div>
          <div class="profile-sub">ID: ${u.id}${u.registeredAt?" · Joined "+new Date(u.registeredAt).toLocaleDateString("en-US",{year:"numeric",month:"long"}):""}</div>
          ${u.description?`<p class="profile-bio">${esc(u.description)}</p>`:""}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px">
        ${u.level!=null?`<div class="stat-box"><div class="stat-val" style="color:var(--accent2)">${u.level}</div><div class="stat-lbl">Level</div></div>`:""}
        ${u.registeredAt?`<div class="stat-box"><div class="stat-val" style="font-size:12px">${new Date(u.registeredAt).toLocaleDateString("en-US",{month:"short",year:"numeric"})}</div><div class="stat-lbl">Joined</div></div>`:""}
        ${u.lastSeenAt?`<div class="stat-box"><div class="stat-val" style="font-size:12px">${new Date(u.lastSeenAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div><div class="stat-lbl">Last Seen</div></div>`:""}
      </div>
      <a href="https://polytoria.com/users/${u.id}" target="_blank" class="btn btn-primary" style="text-decoration:none;width:100%;justify-content:center">View on Polytoria</a>
    </div>`;
  }catch(e){r.innerHTML=`<div class="card"><div class="empty"><div class="empty-icon">◈</div><h3>User not found</h3><p>${esc(e.message)}</p></div></div>`;}
}

// ── Init ──
loadItems();
renderTrades();
</script>
